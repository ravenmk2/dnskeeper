<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dnskeeper — CoreDNS etcd 插件 DNS 管理控制台"
    />
    <title>Dnskeeper</title>
    <script>
      // 防主题闪烁:在 React 渲染前应用持久化的主题
      (function () {
        try {
          var t = localStorage.getItem("dnskeeper-theme");
          var theme =
            t && (t.includes('"dark"') ? "dark" : t.includes('"light"') ? "light" : null);
          if (!theme) {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          var root = document.documentElement;
          root.classList.toggle("dark", theme === "dark");
          root.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
